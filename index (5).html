<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ジョブバトル - オンライン対戦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12131c;
    --panel: #1b1d2b;
    --panel-2: #232538;
    --border: #33364d;
    --text: #ece9f5;
    --muted: #8f8ca8;
    --warrior: #c4453c;
    --mage: #8b5fbf;
    --thief: #3f9d6e;
    --priest: #d4a94c;
    --danger: #e05a4e;
    --good: #4caf7d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(139,95,191,0.18), transparent 45%),
      radial-gradient(ellipse at 90% 0%, rgba(196,69,60,0.14), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:"Noto Sans JP", sans-serif;
    min-height:100vh;
  }
  .display{font-family:"Shippori Mincho", serif;}
  #app{max-width:720px;margin:0 auto;padding:20px 16px 60px;}

  .brandbar{display:flex;align-items:baseline;gap:10px;margin:8px 0 22px;}
  .brandbar .mark{font-family:"Shippori Mincho",serif;font-weight:800;font-size:26px;letter-spacing:.04em;
    background:linear-gradient(90deg,var(--warrior),var(--mage) 40%,var(--priest) 75%,var(--thief));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .brandbar .sub{color:var(--muted);font-size:12px;letter-spacing:.08em;}

  .screen{display:none;}
  .screen.active{display:block;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
  .card h2{font-family:"Shippori Mincho",serif;font-size:19px;margin:0 0 14px;font-weight:700;letter-spacing:.02em;}
  .card h3{font-size:14px;color:var(--muted);margin:0 0 10px;font-weight:500;letter-spacing:.04em;}

  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.03em;}
  input[type=text]{
    width:100%;padding:12px 14px;border-radius:9px;border:1px solid var(--border);
    background:var(--panel-2);color:var(--text);font-size:15px;font-family:inherit;
  }
  input[type=text]:focus{outline:2px solid var(--mage);outline-offset:1px;}

  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{
    appearance:none;border:1px solid var(--border);background:var(--panel-2);color:var(--text);
    padding:11px 18px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
    transition:transform .08s ease, border-color .15s ease, background .15s ease;
  }
  .btn:hover{border-color:#575a78;}
  .btn:active{transform:scale(.97);}
  .btn:focus-visible{outline:2px solid var(--priest);outline-offset:2px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:linear-gradient(135deg,var(--mage),var(--warrior));border:none;color:#fff;}
  .btn-block{width:100%;}
  .btn-sm{padding:7px 12px;font-size:12.5px;}
  .btn.selected{border-color:var(--priest);box-shadow:0 0 0 1px var(--priest) inset;}

  .modeToggle{display:flex;gap:8px;margin-bottom:16px;}
  .modeToggle .btn{flex:1;}

  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;margin:22px 0;letter-spacing:.1em;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border);}

  .err{color:var(--danger);font-size:13px;margin-top:8px;min-height:1em;}

  .roomcode{font-family:"Shippori Mincho",serif;font-size:30px;letter-spacing:.12em;font-weight:800;text-align:center;
    padding:14px;background:var(--panel-2);border-radius:10px;border:1px dashed var(--border);margin-bottom:4px;}
  .roomcode-label{text-align:center;color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:14px;}

  .plist{display:flex;flex-direction:column;gap:8px;}
  .prow{display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;}
  .prow .jobchip{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;flex-shrink:0;color:#fff;}
  .prow .pname{font-weight:700;font-size:14px;flex:1;}
  .prow .ptag{font-size:11px;color:var(--muted);}
  .readydot{width:9px;height:9px;border-radius:50%;background:#5a5d78;flex-shrink:0;}
  .readydot.on{background:var(--good);box-shadow:0 0 6px var(--good);}

  .jobgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .jobcard{border:1px solid var(--border);border-radius:12px;padding:13px;cursor:pointer;background:var(--panel-2);
    transition:border-color .15s ease, transform .1s ease;}
  .jobcard:hover{transform:translateY(-2px);}
  .jobcard.selected{border-width:2px;}
  .jobcard .jname{font-weight:800;font-size:14.5px;margin-bottom:3px;}
  .jobcard .jdesc{font-size:11.5px;color:var(--muted);line-height:1.5;}

  .teamgrid{display:flex;gap:10px;margin-bottom:16px;}
  .teamgrid .btn{flex:1;}

  .barlabel{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px;}
  .barlabel .delta{font-weight:800;margin-left:6px;}
  .barlabel .delta.plus{color:var(--good);}
  .barlabel .delta.minus{color:var(--danger);}
  .bar{height:8px;border-radius:5px;background:#2a2c40;overflow:hidden;margin-bottom:8px;}
  .bar > div{height:100%;border-radius:5px;transition:width .4s ease;}
  .hpbar > div{background:linear-gradient(90deg,#e05a4e,#f0a24e);}
  .mpbar > div{background:linear-gradient(90deg,#4e7de0,#8b5fbf);}

  .pcardbattle{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .pcardbattle.dead{opacity:.4;}
  .pcardbattle .phead{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .pcardbattle .phead .jobchip{width:26px;height:26px;font-size:10.5px;border-radius:6px;}
  .pcardbattle .phead .nm{font-weight:700;font-size:13.5px;}
  .pcardbattle .phead .tagme{font-size:10px;color:var(--priest);border:1px solid var(--priest);border-radius:5px;padding:1px 5px;}
  .pcardbattle .phead .tagteam{font-size:10px;color:var(--muted);}
  .pcardbattle .phead .actdot{margin-left:auto;font-size:10px;color:var(--muted);}
  .pcardbattle .phead .actdot.done{color:var(--good);}

  .turnbanner{text-align:center;margin-bottom:14px;}
  .turnbanner .tnum{font-family:"Shippori Mincho",serif;font-size:13px;color:var(--muted);letter-spacing:.15em;}

  .actionbox{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
  .targetgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .targetgrid-label{grid-column:1 / -1;font-size:11px;color:var(--muted);letter-spacing:.05em;margin:2px 0 2px;}

  .target-chip{
    display:flex;align-items:center;gap:8px;
    appearance:none;cursor:pointer;font-family:inherit;
    background:var(--panel);border:1px solid var(--border);border-left:4px solid var(--muted);
    border-radius:20px;padding:9px 14px 9px 10px;font-size:13px;font-weight:700;color:var(--text);
    transition:transform .08s ease, border-color .15s ease;
  }
  .target-chip:hover{transform:translateY(-1px);}
  .target-chip:active{transform:scale(.97);}
  .target-chip .chip-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
  .target-chip .chip-job{font-size:10.5px;color:var(--muted);font-weight:500;}

  .log{max-height:170px;overflow-y:auto;font-size:12.5px;line-height:1.7;color:var(--muted);
    background:var(--panel-2);border-radius:10px;padding:10px 12px;border:1px solid var(--border);}
  .log div{border-bottom:1px solid #2a2c40;padding:3px 0;}
  .log div:last-child{border-bottom:none;}

  .waitmsg{text-align:center;color:var(--muted);font-size:13px;padding:14px 0;}

  .resulttitle{text-align:center;font-family:"Shippori Mincho",serif;font-size:26px;font-weight:800;margin:6px 0 4px;}
  .resultsub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px;}

  .copybtn{cursor:pointer;}

  @media (max-width:420px){
    .jobgrid{grid-template-columns:1fr;}
    .targetgrid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div id="app">
  <div class="brandbar"><span class="mark">職業戦線</span><span class="sub">JOB BATTLE ONLINE</span></div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="card">
      <h2>プレイヤー登録</h2>
      <label for="input-name">名前</label>
      <input type="text" id="input-name" maxlength="10" placeholder="れいめい">
    </div>

    <div class="card">
      <h2>部屋を作る</h2>
      <div class="modeToggle">
        <button class="btn selected" id="mode-royale" onclick="uiSelectMode('battle_royale')">バトルロワイヤル</button>
        <button class="btn" id="mode-team" onclick="uiSelectMode('team')">チーム戦</button>
      </div>
      <button class="btn btn-primary btn-block" onclick="handleCreateRoom()">部屋を作成する</button>
    </div>

    <div class="divider">または</div>

    <div class="card">
      <h2>部屋に入る</h2>
      <label for="input-code">合言葉(ルームコード)</label>
      <input type="text" id="input-code" maxlength="6" placeholder="例: XJ4K2P" style="text-transform:uppercase;">
      <div style="height:12px;"></div>
      <button class="btn btn-primary btn-block" onclick="handleJoinRoom()">入室する</button>
    </div>
    <div class="err" id="home-err"></div>
  </div>

  <!-- LOBBY -->
  <div class="screen" id="screen-lobby">
    <div class="card">
      <div class="roomcode" id="lobby-code">------</div>
      <div class="roomcode-label copybtn" onclick="copyRoomCode()">タップしてコードをコピー・友達に共有しよう</div>
    </div>

    <div class="card">
      <h2>ジョブを選ぶ</h2>
      <div class="jobgrid" id="job-select-grid"></div>
      <div id="team-select-wrap" style="display:none;">
        <h3>チームを選ぶ</h3>
        <div class="teamgrid" id="team-select-grid"></div>
      </div>
      <button class="btn btn-block" id="ready-btn" onclick="toggleReady()">準備完了</button>
    </div>

    <div class="card">
      <h2>参加者 <span style="color:var(--muted);font-weight:400;font-size:13px;" id="lobby-count"></span></h2>
      <div class="plist" id="lobby-plist"></div>
    </div>

    <button class="btn btn-primary btn-block" id="start-btn" style="display:none;" onclick="handleStartGame()">全員準備完了 - 試合開始</button>
    <div class="err" id="lobby-err"></div>
  </div>

  <!-- BATTLE -->
  <div class="screen" id="screen-battle">
    <div class="turnbanner"><div class="tnum" id="turn-label">TURN 1</div></div>

    <div class="card" id="players-panel"></div>

    <div class="card" id="action-panel">
      <h2>行動を選ぶ</h2>
      <div class="actionbox" id="action-buttons"></div>
      <div class="targetgrid" id="target-buttons"></div>
      <div class="waitmsg" id="battle-wait" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>戦況ログ</h2>
      <div class="log" id="battle-log"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="card" style="text-align:center;">
      <div class="resulttitle" id="result-title">決着</div>
      <div class="resultsub" id="result-sub"></div>
    </div>
    <div class="card">
      <h2>最終ステータス</h2>
      <div id="result-players-panel"></div>
    </div>
    <div class="card">
      <h2>最終ログ</h2>
      <div class="log" id="result-log"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="location.reload()">ホームに戻る</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, set, get, update, onValue, child
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqWeET9qnDYr2WRVxe5V8GS06bgWc0DL4",
  authDomain: "battle-royale-977ae.firebaseapp.com",
  databaseURL: "https://battle-royale-977ae-default-rtdb.firebaseio.com",
  projectId: "battle-royale-977ae",
  storageBucket: "battle-royale-977ae.firebasestorage.app",
  messagingSenderId: "1055353236523",
  appId: "1:1055353236523:web:91730546400907e2eece6e"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- ジョブ定義 ---------- */
// アクション種別: base = 常時選べる基本行動 / ultimate = クールダウン制の必殺技 / situational = 条件を満たした時だけ出現
const JOBS = {
  warrior: { key:"warrior", name:"戦士", color:"#c4453c", maxHp:120, maxMp:0,
    desc:"HPが高い近接タイプ。盗賊に強い。",
    base:[
      {type:"attack", label:"斬撃 (盗賊に強い)"},
      {type:"defend", label:"防御 (被ダメ半減)"}
    ],
    ultimate:{type:"mighty_blow", label:"渾身の一撃", cd:3, needsTarget:true,
      hint:"CD3 / 通常の2倍ダメージ・防御貫通"},
    situational:{type:"tsuigeki", label:"追撃", needsTarget:true,
      hint:"HP30%以下の敵を防御・加護無視で攻撃",
      isAvailable:(me,players,mode,myId)=> getEnemyTargets(me,players,mode,myId).some(([,p])=>p.hp/p.maxHp<=0.3),
      getTargets:(me,players,mode,myId)=> getEnemyTargets(me,players,mode,myId).filter(([,p])=>p.hp/p.maxHp<=0.3)}
  },
  mage: { key:"mage", name:"魔法使い", color:"#8b5fbf", maxHp:80, maxMp:30,
    desc:"MPを消費する魔撃は防御貫通。戦士に強い。",
    base:[
      {type:"spellattack", label:"魔撃 (MP15 / 戦士に強い / 防御貫通)"},
      {type:"normal_attack", label:"通常攻撃 (MP+3回復)"},
      {type:"chant", label:"詠唱 (MP回復+15)"}
    ],
    ultimate:{type:"meteor", label:"大魔法", cd:3, needsTarget:false,
      hint:"CD3 / MP25 / 生存する敵全員に攻撃"},
    situational:{type:"double_cast", label:"二重詠唱", needsTarget:true,
      hint:"MP30以上の時のみ / 魔撃を2回連続で叩き込む",
      isAvailable:(me,players,mode,myId)=> me.mp>=30 && getEnemyTargets(me,players,mode,myId).length>0,
      getTargets:(me,players,mode,myId)=> getEnemyTargets(me,players,mode,myId)}
  },
  thief: { key:"thief", name:"盗賊", color:"#3f9d6e", maxHp:100, maxMp:0,
    desc:"素早い奇襲は防御貫通。魔法使いに強い。",
    base:[
      {type:"ambush", label:"強襲 (魔法使いに強い / 防御貫通)"},
      {type:"evade", label:"回避 (このターンの攻撃を完全回避)"}
    ],
    ultimate:{type:"vital_strike", label:"急所突き", cd:2, needsTarget:true,
      hint:"CD2 / 防御・加護を無視する高威力の一撃"},
    situational:{type:"desperate", label:"捨て身", needsTarget:true,
      hint:"自分のHPが30%以下の時のみ / 与ダメ1.5倍・防御貫通だが次ターン被ダメ増加",
      isAvailable:(me,players,mode,myId)=> (me.hp/me.maxHp)<=0.3 && getEnemyTargets(me,players,mode,myId).length>0,
      getTargets:(me,players,mode,myId)=> getEnemyTargets(me,players,mode,myId)}
  },
  priest: { key:"priest", name:"僧侶", color:"#d4a94c", maxHp:100, maxMp:30,
    desc:"回復と加護で仲間を支える支援役。単体戦闘用の一撃も持つ。",
    base:[
      {type:"normal_attack", label:"通常攻撃 (MP+3回復)"},
      {type:"heal", label:"回復 (MP10 / HP+25)"},
      {type:"bless", label:"加護 (MP10 / 被ダメ30%軽減)"}
    ],
    ultimate:{type:"mass_heal", label:"全体回復", cd:2, needsTarget:false,
      hint:"CD2 / MP20 / 生存する味方全員を回復"},
    situational:{type:"revive", label:"蘇生", needsTarget:true,
      hint:"戦闘不能の味方がいる時のみ / MP25でHP半分で復活させる",
      isAvailable:(me,players,mode,myId)=> me.mp>=25 && getDeadAllies(me,players,mode,myId).length>0,
      getTargets:(me,players,mode,myId)=> getDeadAllies(me,players,mode,myId)}
  }
};
const JOB_ORDER = ["warrior","mage","thief","priest"];

/* ---------- ターゲット抽出ヘルパー ---------- */
function getEnemyTargets(me, players, mode, myId){
  return Object.entries(players).filter(([pid,p])=>{
    if(!p.alive || pid===myId) return false;
    if(mode==="team" && p.team===me.team) return false;
    return true;
  });
}
function getAllyTargets(me, players, mode, myId){
  if(mode==="team"){
    return Object.entries(players).filter(([,p])=>p.alive && p.team===me.team);
  }
  return [[myId, me]];
}
function getDeadAllies(me, players, mode, myId){
  if(mode!=="team") return [];
  return Object.entries(players).filter(([pid,p])=>!p.alive && p.team===me.team && pid!==myId);
}

/* ---------- state ---------- */
let myId = sessionStorage.getItem("jb_playerId");
if(!myId){ myId = crypto.randomUUID(); sessionStorage.setItem("jb_playerId", myId); }
let myName = "";
let roomCode = null;
let selectedMode = "battle_royale";
let isHost = false;
let currentRoomData = null;
let selectedAction = null;
let resolving = false;

/* ---------- screen helper ---------- */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ---------- HOME ---------- */
window.uiSelectMode = function(m){
  selectedMode = m;
  document.getElementById("mode-royale").classList.toggle("selected", m==="battle_royale");
  document.getElementById("mode-team").classList.toggle("selected", m==="team");
};

function randomCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s="";
  for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

window.handleCreateRoom = async function(){
  const errEl = document.getElementById("home-err");
  errEl.textContent = "";
  myName = document.getElementById("input-name").value.trim() || "名無し";
  const code = randomCode();
  try{
    await set(ref(db, "rooms/"+code), {
      mode: selectedMode,
      status: "waiting",
      hostId: myId,
      turn: 0,
      createdAt: Date.now(),
      settings: { maxPlayers: 6 },
      players: {
        [myId]: { name: myName, job: null, team: null, ready:false, alive:true, hp:0, mp:0, maxHp:0, maxMp:0, pendingAction:null, joinedAt: Date.now() }
      }
    });
    roomCode = code; isHost = true;
    enterLobby();
  }catch(e){ errEl.textContent = "部屋の作成に失敗しました: "+e.message; }
};

window.handleJoinRoom = async function(){
  const errEl = document.getElementById("home-err");
  errEl.textContent = "";
  myName = document.getElementById("input-name").value.trim() || "名無し";
  const code = document.getElementById("input-code").value.trim().toUpperCase();
  if(!code){ errEl.textContent = "ルームコードを入力してください"; return; }
  try{
    const snap = await get(ref(db,"rooms/"+code));
    if(!snap.exists()){ errEl.textContent = "その部屋は見つかりませんでした"; return; }
    const roomVal = snap.val();
    if(roomVal.status !== "waiting"){ errEl.textContent = "この部屋はすでに開始済みです"; return; }
    const playerCount = roomVal.players ? Object.keys(roomVal.players).length : 0;
    const already = roomVal.players && roomVal.players[myId];
    if(!already && playerCount >= (roomVal.settings?.maxPlayers || 6)){
      errEl.textContent = "この部屋は満員です"; return;
    }
    await update(ref(db, "rooms/"+code+"/players/"+myId), {
      name: myName, job:null, team:null, ready:false, alive:true, hp:0, mp:0, maxHp:0, maxMp:0, pendingAction:null, joinedAt: Date.now()
    });
    roomCode = code; isHost = (roomVal.hostId === myId);
    enterLobby();
  }catch(e){ errEl.textContent = "入室に失敗しました: "+e.message; }
};

/* ---------- LOBBY ---------- */
function enterLobby(){
  document.getElementById("lobby-code").textContent = roomCode;
  buildJobGrid();
  showScreen("screen-lobby");
  listenRoom();
}

window.copyRoomCode = function(){
  if(navigator.clipboard) navigator.clipboard.writeText(roomCode).catch(()=>{});
};

function buildJobGrid(){
  const grid = document.getElementById("job-select-grid");
  grid.innerHTML = "";
  JOB_ORDER.forEach(k=>{
    const j = JOBS[k];
    const div = document.createElement("div");
    div.className = "jobcard";
    div.style.borderColor = j.color+"55";
    div.id = "jobcard-"+k;
    div.innerHTML = `<div class="jname" style="color:${j.color}">${j.name}</div><div class="jdesc">${j.desc}</div>`;
    div.onclick = ()=>selectJob(k);
    grid.appendChild(div);
  });
}

async function selectJob(k){
  const j = JOBS[k];
  await update(ref(db,"rooms/"+roomCode+"/players/"+myId), {
    job:k, maxHp:j.maxHp, maxMp:j.maxMp, hp:j.maxHp, mp:j.maxMp, cdUltimate:0, vulnerable:false
  });
}

async function selectTeam(t){
  await update(ref(db,"rooms/"+roomCode+"/players/"+myId), { team:t });
}
window.selectTeamGlobal = selectTeam;

window.toggleReady = async function(){
  const me = currentRoomData?.players?.[myId];
  if(!me) return;
  if(!me.job){ document.getElementById("lobby-err").textContent = "先にジョブを選んでください"; return; }
  if(currentRoomData.mode === "team" && (me.team===undefined || me.team===null)){
    document.getElementById("lobby-err").textContent = "先にチームを選んでください"; return;
  }
  document.getElementById("lobby-err").textContent = "";
  await update(ref(db,"rooms/"+roomCode+"/players/"+myId), { ready: !me.ready });
};

window.handleStartGame = async function(){
  if(!isHost) return;
  const players = currentRoomData.players || {};
  const updates = {};
  Object.keys(players).forEach(pid=>{
    updates["players/"+pid+"/pendingAction"] = null;
  });
  updates["status"] = "in_progress";
  updates["turn"] = 1;
  updates["log/0"] = "戦いの火蓋が切られた…";
  await update(ref(db,"rooms/"+roomCode), updates);
};

/* ---------- room listener (renders lobby / battle / result) ---------- */
function listenRoom(){
  onValue(ref(db,"rooms/"+roomCode), (snap)=>{
    if(!snap.exists()) return;
    currentRoomData = snap.val();
    isHost = currentRoomData.hostId === myId;

    if(currentRoomData.status === "waiting") renderLobby();
    else if(currentRoomData.status === "in_progress"){ renderBattle(); if(isHost) maybeResolveTurn(); }
    else if(currentRoomData.status === "finished") renderResult();
  });
}

function renderLobby(){
  showScreen("screen-lobby");
  const players = currentRoomData.players || {};
  document.getElementById("team-select-wrap").style.display = currentRoomData.mode==="team" ? "block":"none";
  if(currentRoomData.mode==="team"){
    const tgrid = document.getElementById("team-select-grid");
    tgrid.innerHTML = "";
    [1,2].forEach(t=>{
      const b = document.createElement("button");
      b.className = "btn"+((players[myId]?.team===t)?" selected":"");
      b.textContent = "チーム "+t;
      b.onclick = ()=>selectTeamGlobal(t);
      tgrid.appendChild(b);
    });
  }
  JOB_ORDER.forEach(k=>{
    const el = document.getElementById("jobcard-"+k);
    if(!el) return;
    const mine = players[myId]?.job === k;
    el.classList.toggle("selected", mine);
    el.style.borderWidth = mine ? "2px" : "1px";
  });
  const readyBtn = document.getElementById("ready-btn");
  const me = players[myId];
  readyBtn.textContent = me?.ready ? "準備解除する" : "準備完了";
  readyBtn.classList.toggle("selected", !!me?.ready);

  const list = Object.entries(players);
  document.getElementById("lobby-count").textContent = `(${list.length}/${currentRoomData.settings?.maxPlayers||6})`;
  const plistEl = document.getElementById("lobby-plist");
  plistEl.innerHTML = "";
  list.sort((a,b)=>(a[1].joinedAt||0)-(b[1].joinedAt||0)).forEach(([pid,p])=>{
    const row = document.createElement("div");
    row.className = "prow";
    const jobInfo = p.job ? JOBS[p.job] : null;
    row.innerHTML = `
      <div class="jobchip" style="background:${jobInfo?jobInfo.color:'#3a3d54'}">${jobInfo?jobInfo.name[0]:'?'}</div>
      <div class="pname">${escapeHtml(p.name)}${pid===currentRoomData.hostId?' <span class="ptag">(部屋主)</span>':''}</div>
      <div class="ptag">${currentRoomData.mode==="team" ? (p.team?("チーム"+p.team):"未選択") : ""}</div>
      <div class="readydot ${p.ready?'on':''}"></div>
    `;
    plistEl.appendChild(row);
  });

  const startBtn = document.getElementById("start-btn");
  const allReady = list.length>=2 && list.every(([,p])=>p.ready && p.job && (currentRoomData.mode!=="team" || p.team));
  startBtn.style.display = isHost ? "block":"none";
  startBtn.disabled = !allReady;
  startBtn.textContent = allReady ? "全員準備完了 - 試合開始" : "全員の準備完了を待っています…";
}

/* ---------- プレイヤーステータス描画(共通) ---------- */
function renderPlayerStatusCards(containerEl, players, opts){
  opts = opts || {};
  containerEl.innerHTML = "";
  Object.entries(players).sort((a,b)=>(a[1].joinedAt||0)-(b[1].joinedAt||0)).forEach(([pid,p])=>{
    const j = JOBS[p.job];
    const acted = !!p.pendingAction;
    const hpDelta = p.lastHpDelta || 0;
    const mpDelta = p.lastMpDelta || 0;
    const hpDeltaHtml = hpDelta!==0 ? `<span class="delta ${hpDelta>0?'plus':'minus'}">${hpDelta>0?'+':''}${hpDelta}</span>` : '';
    const mpDeltaHtml = mpDelta!==0 ? `<span class="delta ${mpDelta>0?'plus':'minus'}">${mpDelta>0?'+':''}${mpDelta}</span>` : '';
    const div = document.createElement("div");
    div.className = "pcardbattle"+(p.alive?"":" dead");
    div.innerHTML = `
      <div class="phead">
        <div class="jobchip" style="background:${j.color}">${j.name[0]}</div>
        <div class="nm">${escapeHtml(p.name)}</div>
        ${pid===myId?'<span class="tagme">YOU</span>':''}
        ${currentRoomData.mode==="team"?`<span class="tagteam">T${p.team}</span>`:''}
        ${opts.showActStatus ? `<span class="actdot ${acted?'done':''}">${p.alive ? (acted?'行動決定':'選択中…') : '戦闘不能'}</span>` : (!p.alive ? `<span class="actdot">戦闘不能</span>` : '')}
      </div>
      <div class="barlabel"><span>HP</span><span>${Math.max(0,p.hp)}/${p.maxHp}${hpDeltaHtml}</span></div>
      <div class="bar hpbar"><div style="width:${Math.max(0,p.hp)/p.maxHp*100}%"></div></div>
      ${j.maxMp>0?`<div class="barlabel"><span>MP</span><span>${p.mp}/${p.maxMp}${mpDeltaHtml}</span></div><div class="bar mpbar"><div style="width:${p.mp/j.maxMp*100}%"></div></div>`:''}
    `;
    containerEl.appendChild(div);
  });
}

/* ---------- BATTLE ---------- */
function renderBattle(){
  showScreen("screen-battle");
  document.getElementById("turn-label").textContent = "TURN "+(currentRoomData.turn||1);
  const players = currentRoomData.players || {};
  const panel = document.getElementById("players-panel");
  renderPlayerStatusCards(panel, players, {showActStatus:true});

  const log = document.getElementById("battle-log");
  const logObj = currentRoomData.log || {};
  const keys = Object.keys(logObj).map(Number).sort((a,b)=>b-a);
  log.innerHTML = keys.map(k=>`<div>${escapeHtml(logObj[k])}</div>`).join("");

  const me = players[myId];
  const actionPanel = document.getElementById("action-panel");
  const waitEl = document.getElementById("battle-wait");
  if(!me || !me.alive){
    actionPanel.style.display="none";
  } else if(me.pendingAction){
    actionPanel.style.display="block";
    document.getElementById("action-buttons").innerHTML="";
    document.getElementById("target-buttons").innerHTML="";
    waitEl.style.display="block";
    waitEl.textContent = "行動を決定しました。他のプレイヤーを待っています…";
  } else {
    actionPanel.style.display="block";
    waitEl.style.display="none";
    renderActionButtons(me);
  }
}

function renderActionButtons(me){
  const j = JOBS[me.job];
  const box = document.getElementById("action-buttons");
  box.innerHTML = "";
  selectedAction = null;
  document.getElementById("target-buttons").innerHTML = "";
  const mode = currentRoomData.mode;
  const players = currentRoomData.players;

  // 基本アクション
  j.base.forEach(a=>{
    const b = document.createElement("button");
    b.className = "btn btn-block";
    b.textContent = a.label;
    b.onclick = ()=>onPickAction(a.type, me);
    box.appendChild(b);
  });

  // 必殺技(クールダウン制)
  const cd = me.cdUltimate || 0;
  const ub = document.createElement("button");
  ub.className = "btn btn-block";
  ub.style.borderColor = JOBS[me.job].color;
  if(cd>0){
    ub.disabled = true;
    ub.textContent = `${j.ultimate.label} (あと${cd}ターン使用不可)`;
  } else {
    ub.textContent = `★ ${j.ultimate.label} — ${j.ultimate.hint}`;
    ub.onclick = ()=>onPickAction(j.ultimate.type, me);
  }
  box.appendChild(ub);

  // 状況依存アクション(条件を満たした時だけ表示)
  if(j.situational.isAvailable(me, players, mode, myId)){
    const sb = document.createElement("button");
    sb.className = "btn btn-block";
    sb.style.borderColor = "#e0c24e";
    sb.textContent = `◆ ${j.situational.label} — ${j.situational.hint}`;
    sb.onclick = ()=>onPickAction(j.situational.type, me);
    box.appendChild(sb);
  }
}

// 対象を必要としないアクション(自分自身にのみ作用、または全体に自動適用)
const NO_TARGET_TYPES = ["defend","evade","chant","meteor","mass_heal"];
// 味方(自分含む)を対象にするアクション
const ALLY_TARGET_TYPES = ["heal","bless"];

function getActionDef(type){
  for(const key of JOB_ORDER){
    const j = JOBS[key];
    if(j.ultimate.type===type) return j.ultimate;
    if(j.situational.type===type) return j.situational;
  }
  return null;
}

function onPickAction(type, me){
  selectedAction = type;
  const tbox = document.getElementById("target-buttons");
  tbox.innerHTML = "";
  const mode = currentRoomData.mode;
  const players = currentRoomData.players;

  if(NO_TARGET_TYPES.includes(type)){
    submitAction(type, null);
    return;
  }

  let candidates = [];
  const def = getActionDef(type);
  if(def && def.getTargets){
    candidates = def.getTargets(me, players, mode, myId);
  } else if(ALLY_TARGET_TYPES.includes(type)){
    candidates = getAllyTargets(me, players, mode, myId);
  } else {
    candidates = getEnemyTargets(me, players, mode, myId);
  }

  if(candidates.length===0){
    submitAction(type, myId);
    return;
  }
  const labelEl = document.createElement("div");
  labelEl.className = "targetgrid-label";
  labelEl.textContent = "対象を選んでください";
  tbox.appendChild(labelEl);
  candidates.forEach(([pid,p])=>{
    const b = document.createElement("button");
    b.className = "target-chip";
    const jobColor = JOBS[p.job].color;
    b.style.borderLeftColor = jobColor;
    b.innerHTML = `<span class="chip-dot" style="background:${jobColor}">${JOBS[p.job].name[0]}</span>`+
      `<span>${(pid===myId?"自分・":"")}${escapeHtml(p.name)}</span>`+
      `<span class="chip-job">[${JOBS[p.job].name}]</span>`;
    b.onclick = ()=>submitAction(type, pid);
    tbox.appendChild(b);
  });
}

async function submitAction(type, targetId){
  await update(ref(db,"rooms/"+roomCode+"/players/"+myId), {
    pendingAction: { type, targetId: targetId||null }
  });
}

/* ---------- turn resolution (host only) ---------- */
async function maybeResolveTurn(){
  if(resolving) return;
  const players = currentRoomData.players || {};
  const alivePlayers = Object.entries(players).filter(([,p])=>p.alive);
  if(alivePlayers.length===0) return;
  const allActed = alivePlayers.every(([,p])=>p.pendingAction);
  if(!allActed) return;
  resolving = true;
  try{
    await resolveTurn(players);
  } finally {
    resolving = false;
  }
}

async function resolveTurn(players){
  const logLines = [];
  const state = {};
  Object.entries(players).forEach(([pid,p])=>{
    state[pid] = { ...p, dodge:false, defend:false, shield:false, vulnerable: !!p.vulnerable, cdUltimate: p.cdUltimate||0 };
  });

  const order = Object.entries(players);
  const ULT_CD = { warrior:3, mage:3, thief:2, priest:2 };

  function applyAttack(attackerName, targetState, dmg, opts, verb){
    opts = opts || {};
    if(!targetState || !targetState.alive){ logLines.push(`${attackerName}の攻撃は対象を見失った。`); return; }
    if(targetState.dodge){ logLines.push(`${attackerName}の攻撃を${targetState.name}が完全に回避した！`); return; }
    let d = dmg;
    if(opts.bonusVs && targetState.job===opts.bonusVs) d = Math.round(d*1.5);
    if(!opts.ignoreAll){
      if(targetState.defend && !opts.pierce) d = Math.round(d*0.5);
      if(targetState.shield) d = Math.round(d*0.7);
    }
    if(targetState.vulnerable) d = Math.round(d*1.5);
    d = Math.max(0, d);
    targetState.hp = Math.max(0, targetState.hp - d);
    logLines.push(`${attackerName}の${verb}が${targetState.name}に${d}ダメージ！${targetState.hp<=0?`(${targetState.name}は戦闘不能)`:''}`);
    if(targetState.hp<=0) targetState.alive = false;
  }

  // Phase 1: 防御・回避・詠唱・加護の宣言
  order.forEach(([pid,p])=>{
    if(!p.alive || !p.pendingAction) return;
    const act = p.pendingAction;
    const me = state[pid];
    if(act.type==="defend"){ me.defend = true; logLines.push(`${p.name}は防御の構えを取った。`); }
    if(act.type==="evade"){ me.dodge = true; logLines.push(`${p.name}は物陰に身を隠した。`); }
    if(act.type==="chant"){ me.mp = Math.min(JOBS[p.job].maxMp, me.mp+15); logLines.push(`${p.name}は詠唱し、MPを回復した。(MP ${me.mp})`); }
    if(act.type==="bless"){
      const tgt = state[act.targetId];
      if(tgt && me.mp>=10){ me.mp -= 10; tgt.shield = true; logLines.push(`${p.name}は${tgt.name}に加護を与えた。`); }
      else if(me.mp<10){ logLines.push(`${p.name}はMPが足りず加護を発動できなかった。`); }
    }
  });

  // Phase 2: 攻撃(通常・必殺技・状況依存)
  order.forEach(([pid,p])=>{
    if(!p.alive || !p.pendingAction) return;
    const act = p.pendingAction;
    const attacker = state[pid];
    const type = act.type;

    if(type==="attack"){
      applyAttack(p.name, state[act.targetId], 20, {bonusVs:"thief"}, "斬撃");
    } else if(type==="spellattack"){
      if(attacker.mp<15){ logLines.push(`${p.name}はMPが足りず魔撃を放てなかった。`); return; }
      attacker.mp -= 15;
      applyAttack(p.name, state[act.targetId], 25, {pierce:true, bonusVs:"warrior"}, "魔撃");
    } else if(type==="ambush"){
      applyAttack(p.name, state[act.targetId], 18, {pierce:true, bonusVs:"mage"}, "強襲");
    } else if(type==="normal_attack"){
      applyAttack(p.name, state[act.targetId], 12, {}, "通常攻撃");
      attacker.mp = Math.min(JOBS[p.job].maxMp, attacker.mp+3);
    } else if(type==="mighty_blow"){
      applyAttack(p.name, state[act.targetId], 40, {pierce:true, bonusVs:"thief"}, "渾身の一撃");
      attacker.cdUltimate = ULT_CD.warrior;
    } else if(type==="tsuigeki"){
      applyAttack(p.name, state[act.targetId], 22, {ignoreAll:true}, "追撃");
    } else if(type==="vital_strike"){
      applyAttack(p.name, state[act.targetId], 35, {ignoreAll:true}, "急所突き");
      attacker.cdUltimate = ULT_CD.thief;
    } else if(type==="desperate"){
      applyAttack(p.name, state[act.targetId], 27, {pierce:true}, "捨て身の一撃");
      attacker.vulnerableNext = true;
    } else if(type==="double_cast"){
      if(attacker.mp<30){ logLines.push(`${p.name}はMPが足りず二重詠唱を放てなかった。`); return; }
      attacker.mp -= 30;
      applyAttack(p.name, state[act.targetId], 25, {pierce:true, bonusVs:"warrior"}, "二重詠唱・一撃目");
      applyAttack(p.name, state[act.targetId], 25, {pierce:true, bonusVs:"warrior"}, "二重詠唱・二撃目");
    } else if(type==="meteor"){
      if(attacker.mp<25){ logLines.push(`${p.name}はMPが足りず大魔法を放てなかった。`); return; }
      attacker.mp -= 25;
      const enemies = getEnemyTargets(p, players, currentRoomData.mode, pid);
      if(enemies.length===0){ logLines.push(`${p.name}の大魔法は対象がおらず不発に終わった。`); }
      enemies.forEach(([epid])=>{ applyAttack(p.name, state[epid], 15, {pierce:true}, "大魔法"); });
      attacker.cdUltimate = ULT_CD.mage;
    }
  });

  // Phase 3: 回復・蘇生
  order.forEach(([pid,p])=>{
    if(!p.alive || !p.pendingAction) return;
    const act = p.pendingAction;
    const healer = state[pid];
    const type = act.type;

    if(type==="heal"){
      const target = state[act.targetId];
      if(!target || !target.alive) return;
      if(healer.mp<10){ logLines.push(`${p.name}はMPが足りず回復できなかった。`); return; }
      healer.mp -= 10;
      target.hp = Math.min(target.maxHp, target.hp+25);
      logLines.push(`${p.name}は${target.name}を25回復した。(HP ${target.hp})`);
    } else if(type==="mass_heal"){
      if(healer.mp<20){ logLines.push(`${p.name}はMPが足りず全体回復を放てなかった。`); return; }
      healer.mp -= 20;
      const allies = getAllyTargets(p, players, currentRoomData.mode, pid).filter(([apid])=>state[apid].alive);
      allies.forEach(([apid])=>{
        const tgt = state[apid];
        tgt.hp = Math.min(tgt.maxHp, tgt.hp+20);
      });
      logLines.push(`${p.name}の全体回復で味方が回復した。`);
      healer.cdUltimate = ULT_CD.priest;
    } else if(type==="revive"){
      if(healer.mp<25){ logLines.push(`${p.name}はMPが足りず蘇生できなかった。`); return; }
      const target = state[act.targetId];
      if(!target || target.alive) return;
      healer.mp -= 25;
      target.alive = true;
      target.hp = Math.max(1, Math.floor(target.maxHp/2));
      logLines.push(`${p.name}は${target.name}を蘇生させた！(HP ${target.hp})`);
    }
  });

  // ターン終了処理: クールダウン減少・被ダメ増加(vulnerable)の引き継ぎ
  // このターンに必殺技を使った人は上でcdUltimateがセットされている。
  // 使っていない人は既存のcdUltimateから1減らす(0未満にはしない)。
  order.forEach(([pid,p])=>{
    const s = state[pid];
    const act = p.pendingAction;
    const usedUltimateNow = act && ["mighty_blow","meteor","vital_strike","mass_heal"].includes(act.type);
    if(!usedUltimateNow){
      s.cdUltimate = Math.max(0, (p.cdUltimate||0) - 1);
    }
    s.vulnerable = !!s.vulnerableNext; // 次ターンへの被ダメ増加を反映
  });

  // build updates
  const updates = {};
  Object.entries(state).forEach(([pid,s])=>{
    const prev = players[pid];
    updates["players/"+pid+"/hp"] = s.hp;
    updates["players/"+pid+"/mp"] = s.mp;
    updates["players/"+pid+"/alive"] = s.alive;
    updates["players/"+pid+"/pendingAction"] = null;
    updates["players/"+pid+"/cdUltimate"] = s.cdUltimate;
    updates["players/"+pid+"/vulnerable"] = s.vulnerable;
    updates["players/"+pid+"/lastHpDelta"] = s.hp - (prev.hp||0);
    updates["players/"+pid+"/lastMpDelta"] = s.mp - (prev.mp||0);
  });

  // win check
  const alive = Object.entries(state).filter(([,s])=>s.alive);
  let finished = false, winnerText = "";
  if(currentRoomData.mode === "team"){
    const teamsAlive = new Set(alive.map(([,s])=>s.team));
    if(teamsAlive.size<=1){
      finished = true;
      winnerText = teamsAlive.size===1 ? `チーム ${[...teamsAlive][0]} の勝利！` : "引き分け(生存者なし)";
    }
  } else {
    if(alive.length<=1){
      finished = true;
      winnerText = alive.length===1 ? `${alive[0][1].name} の勝利！` : "引き分け(生存者なし)";
    }
  }

  const nextTurn = (currentRoomData.turn||1)+1;
  const logBase = Object.keys(currentRoomData.log||{}).length;
  logLines.forEach((line,i)=>{ updates["log/"+(logBase+i)] = line; });

  if(finished){
    updates["status"] = "finished";
    updates["winnerText"] = winnerText;
  } else {
    updates["turn"] = nextTurn;
  }

  await update(ref(db,"rooms/"+roomCode), updates);
}

/* ---------- RESULT ---------- */
function renderResult(){
  showScreen("screen-result");
  document.getElementById("result-title").textContent = "決着";
  document.getElementById("result-sub").textContent = currentRoomData.winnerText || "";
  const players = currentRoomData.players || {};
  const statusPanel = document.getElementById("result-players-panel");
  renderPlayerStatusCards(statusPanel, players, {showActStatus:false});
  const log = document.getElementById("result-log");
  const logObj = currentRoomData.log || {};
  const keys = Object.keys(logObj).map(Number).sort((a,b)=>a-b);
  log.innerHTML = keys.map(k=>`<div>${escapeHtml(logObj[k])}</div>`).join("");
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
